<!DOCTYPE html>
<html>
<head>
    <title>Settings - Vic Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Vic Platform</h2>

    <button onclick="location.href='index.html'">🏠 Home</button>
    <button onclick="location.href='games.html'">🎮 Games</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>
    <button onclick="location.href='chat.html'">💬 Chat</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='notifications.html'">🔔 Notifications</button>
    <button onclick="location.href='settings.html'">⚙️ Settings</button>
    <button onclick="location.href='login.html'">🔑 Login</button>
</div>

<!-- MAIN -->
<div class="main">

    <h1>⚙️ Settings</h1>

    <div class="game">

        <!-- USERNAME -->
        <h3>Username</h3>
        <input class="textbox" id="usernameInput" type="text" disabled>

        <br><br>

        <!-- LANGUAGE -->
        <h3>Language</h3>
        <select class="textbox" id="languageInput">
            <option value="en">English</option>
            <option value="vi">Vietnamese</option>
        </select>

        <br><br>

        <!-- AVATAR -->
        <h3>Avatar</h3>

        <input type="file" id="avatarInput" accept="image/*">

        <br><br>

        <img id="avatarPreview" width="120" src="https://placehold.co/120x120">

        <br><br>

        <button class="play-button" onclick="saveSettings()">
            Save Changes
        </button>

    </div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
    ref,
    get,
    update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let currentUser =
    JSON.parse(
        localStorage.getItem(
            "currentUser"
        )
    );

if (!currentUser) {

    window.location.href =
        "login.html";

}


// ======================
// LOAD SETTINGS
// ======================

async function loadSettings() {

    let snap =
        await get(
            ref(
                db,
                "users/" +
                currentUser.username
            )
        );

    if (!snap.exists())
        return;

    let data =
        snap.val();

    document.getElementById(
        "usernameInput"
    ).value =
        data.username || "";

    document.getElementById(
        "languageInput"
    ).value =
        data.language || "en";

    document.getElementById(
        "avatarPreview"
    ).src =
        data.avatar ||
        "https://placehold.co/120x120";

}

loadSettings();


// ======================
// AVATAR UPLOAD
// ======================

document.getElementById(
    "avatarInput"
).addEventListener(
    "change",

    function (e) {

        let file =
            e.target.files[0];

        if (!file)
            return;

        let reader =
            new FileReader();

        reader.onload =
            function (event) {

                let base64 =
                    event.target.result;

                document.getElementById(
                    "avatarPreview"
                ).src =
                    base64;

                document.getElementById(
                    "avatarInput"
                ).dataset.base64 =
                    base64;

            };

        reader.readAsDataURL(
            file
        );

    }

);


// ======================
// SAVE SETTINGS
// ======================

window.saveSettings =
async function () {

    let language =
        document.getElementById(
            "languageInput"
        ).value;

    let avatar =
        document.getElementById(
            "avatarInput"
        ).dataset.base64 ||

        document.getElementById(
            "avatarPreview"
        ).src;

    await update(

        ref(
            db,
            "users/" +
            currentUser.username
        ),

        {

            language:
                language,

            avatar:
                avatar

        }

    );


    // update session

    localStorage.setItem(

        "currentUser",

        JSON.stringify({

            username:
                currentUser.username,

            avatar:
                avatar

        })

    );

    alert(
        "Settings saved!"
    );

};

</script>

<script type="module" src="script.js"></script>

</body>
</html>
