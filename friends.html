<!DOCTYPE html>
<html>
<head>
    <title>Friends - Vic Platform</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .container {
            max-width: 800px;
            margin: 30px auto;
        }

        .box {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #111;
            margin-top: 10px;
            border-radius: 8px;
            align-items: center;
        }

        .online { color: #00ff88; }
        .offline { color: gray; }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Vic Platform</h2>

    <button onclick="location.href='index.html'">🏠 Home</button>
    <button onclick="location.href='games.html'">🎮 Games</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>
    <button onclick="location.href='chat.html'">💬 Chat</button>
    <button onclick="location.href='login.html'">🔑 Login</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='notifications.html'">🔔 Notifications</button>
    <button onclick="location.href='settings.html'">⚙️ Settings</button>
</div>

<div class="main">

<div class="container">

    <h1>👥 Friends System</h1>

    <div class="box">
        <h3>🔎 Find User</h3>

        <div class="row">
            <input id="searchInput" placeholder="Enter username">
            <button onclick="searchUser()">Search</button>
        </div>

        <div id="searchResult"></div>
    </div>

    <div class="box">
        <h3>📩 Friend Requests</h3>
        <div id="requestList"></div>
    </div>

    <div class="box">
        <h3>👥 Your Friends</h3>
        <div id="friendList"></div>
    </div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
    ref,
    get,
    update,
    onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// =====================
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (!currentUser) location.href = "login.html";

// =====================
// SEARCH USER
// =====================
window.searchUser = async function () {

    let username = document.getElementById("searchInput").value.trim();
    let box = document.getElementById("searchResult");

    if (!username) return;

    let snap = await get(ref(db, "users/" + username));

    if (!snap.exists()) {
        box.innerHTML = "<p>❌ User not found</p>";
        return;
    }

    let data = snap.val();

    if (data.username === currentUser.username) {
        box.innerHTML = "<p>This is you.</p>";
        return;
    }

    box.innerHTML = `
        <div class="item">
            <b>${data.username}</b>
            <button onclick="sendFriendRequest('${data.username}')">
                Add Friend
            </button>
        </div>
    `;
};

// =====================
// SEND REQUEST
// =====================
window.sendFriendRequest = async function (targetUsername) {

    let targetRef = ref(db, "users/" + targetUsername);
    let snap = await get(targetRef);

    if (!snap.exists()) return;

    let target = snap.val();

    let requests = target.requests || [];

    if (requests.includes(currentUser.username)) return;

    requests.push(currentUser.username);

    await update(targetRef, {
        requests: requests
    });

    alert("Friend request sent!");
};

// =====================
// ACCEPT FRIEND
// =====================
window.acceptFriend = async function (username) {

    let myRef = ref(db, "users/" + currentUser.username);
    let targetRef = ref(db, "users/" + username);

    let mySnap = await get(myRef);
    let targetSnap = await get(targetRef);

    if (!mySnap.exists() || !targetSnap.exists()) return;

    let me = mySnap.val();
    let target = targetSnap.val();

    let myFriends = me.friends || [];
    let targetFriends = target.friends || [];
    let requests = me.requests || [];

    if (!myFriends.includes(username)) myFriends.push(username);
    if (!targetFriends.includes(currentUser.username)) targetFriends.push(currentUser.username);

    requests = requests.filter(x => x !== username);

    await update(myRef, {
        friends: myFriends,
        requests: requests
    });

    await update(targetRef, {
        friends: targetFriends
    });
};

// =====================
// LOAD REQUESTS (REALTIME SAFE)
// =====================
let requestsListener = null;

function loadRequests() {

    let box = document.getElementById("requestList");
    if (!box) return;

    let userRef = ref(db, "users/" + currentUser.username);

    if (requestsListener) requestsListener();

    requestsListener = onValue(userRef, (snap) => {

        if (!snap.exists()) return;

        let data = snap.val();
        let requests = data.requests || [];

        box.innerHTML = "";

        if (requests.length === 0) {
            box.innerHTML = "<p>No requests</p>";
            return;
        }

        requests.forEach(u => {
            box.innerHTML += `
                <div class="item">
                    <div>${u}</div>
                    <button onclick="acceptFriend('${u}')">Accept</button>
                </div>
            `;
        });
    });
}

// =====================
// LOAD FRIENDS (REALTIME SAFE)
// =====================
let friendsListener = null;

function loadFriends() {

    let box = document.getElementById("friendList");
    if (!box) return;

    let userRef = ref(db, "users/" + currentUser.username);

    if (friendsListener) friendsListener();

    friendsListener = onValue(userRef, async (snap) => {

        if (!snap.exists()) return;

        let data = snap.val();
        let friends = data.friends || [];

        box.innerHTML = "";

        if (friends.length === 0) {
            box.innerHTML = "<p>No friends yet</p>";
            return;
        }

        for (let u of friends) {

            let fsnap = await get(ref(db, "users/" + u));
            if (!fsnap.exists()) continue;

            let f = fsnap.val();

            box.innerHTML += `
                <div class="item">
                    <div>
                        <b>${f.username}</b>
                        <div class="${f.online ? "online" : "offline"}">
                            ${f.online ? "🟢 Online" : "⚫ Offline"}
                        </div>
                    </div>

                    <button class="danger" onclick="removeFriend('${f.username}')">
                        Remove
                    </button>
                </div>
            `;
        }
    });
}

// placeholder (không crash UI)
window.removeFriend = async function (username) {
    let refUser = ref(db, "users/" + currentUser.username);
    let snap = await get(refUser);

    if (!snap.exists()) return;

    let data = snap.val();
    let friends = data.friends || [];

    friends = friends.filter(x => x !== username);

    await update(refUser, { friends });
};

// =====================
loadRequests();
loadFriends();

</script>

</body>
</html>
