<!DOCTYPE html>
<html>
<head>
    <title>Notifications - Vic Platform</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .notify-box{
            background:#1f1f1f;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
        }

        .notification{
            background:#111;
            padding:15px;
            border-radius:10px;
            margin-bottom:15px;
        }

        .accept{
            background:#00c853;
            color:white;
        }

        .reject{
            background:red;
            color:white;
        }

        button{
            padding:8px 14px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin-right:10px;
        }

        .time{
            color:gray;
            font-size:13px;
        }
    </style>

</head>
<body>

<div class="sidebar">
    <h2>Vic Platform</h2>

    <button onclick="location.href='index.html'">🏠 Home</button>
    <button onclick="location.href='games.html'">🎮 Games</button>
    <button onclick="location.href='profile.html'">👤 Profile</button>
    <button onclick="location.href='chat.html'">💬 Chat</button>
    <button onclick="location.href='login.html'">🔑 Login</button>
    <button onclick="location.href='friends.html'">👥 Friends</button>
    <button onclick="location.href='notifications.html'">🔔 Notifications</button>
    <button onclick="location.href='settings.html'">⚙️ Settings</button>
</div>

<div class="main">

<h1>🔔 Notifications</h1>

<div class="notify-box">

    <div id="notificationList"></div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
    ref,
    get,
    update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


let currentUser =
    JSON.parse(
        localStorage.getItem(
            "currentUser"
        )
    );

if (!currentUser) {

    location.href =
        "login.html";

}



// ====================
// LOAD NOTIFICATIONS
// ====================

async function loadNotifications() {

    let box =
        document.getElementById(
            "notificationList"
        );

    box.innerHTML = "";


    // welcome message
    box.innerHTML += `

    <div class="notification">

        <h3>
            🎉 Welcome to Vic Platform!
        </h3>

        <div class="time">
            Enjoy your experience.
        </div>

    </div>

    `;


    let snap =
        await get(
            ref(
                db,
                "users/" +
                currentUser.username
            )
        );

    if (!snap.exists())
        return;


    let data =
        snap.val();

    let requests =
        data.requests || [];


    requests.forEach(

        username => {

            box.innerHTML += `

            <div class="notification">

                <h3>

                    👥 ${username}
                    sent you a friend request

                </h3>

                <div class="time">

                    just now

                </div>

                <br>

                <button
                class="accept"

                onclick="acceptAndRefresh('${username}')">

                    Accept

                </button>

                <button
                class="reject"

                onclick="rejectRequest('${username}')">

                    Reject

                </button>

            </div>

            `;

        }

    );

}



// ====================
// ACCEPT
// ====================

window.acceptAndRefresh =
async function (username) {

    let mySnap =
        await get(
            ref(
                db,
                "users/" +
                currentUser.username
            )
        );

    let targetSnap =
        await get(
            ref(
                db,
                "users/" +
                username
            )
        );

    if (
        !mySnap.exists() ||
        !targetSnap.exists()
    ) return;


    let me =
        mySnap.val();

    let target =
        targetSnap.val();


    let myFriends =
        me.friends || [];

    let targetFriends =
        target.friends || [];


    if (
        !myFriends.includes(
            username
        )
    ) {

        myFriends.push(
            username
        );

    }


    if (
        !targetFriends.includes(
            currentUser.username
        )
    ) {

        targetFriends.push(
            currentUser.username
        );

    }


    let requests =
        me.requests || [];

    requests =
        requests.filter(
            x => x !== username
        );


    await update(

        ref(
            db,
            "users/" +
            currentUser.username
        ),

        {

            friends:
                myFriends,

            requests:
                requests

        }

    );


    await update(

        ref(
            db,
            "users/" +
            username
        ),

        {

            friends:
                targetFriends

        }

    );


    loadNotifications();

};



// ====================
// REJECT
// ====================

window.rejectRequest =
async function (username) {

    let snap =
        await get(
            ref(
                db,
                "users/" +
                currentUser.username
            )
        );

    if (!snap.exists())
        return;


    let data =
        snap.val();

    let requests =
        data.requests || [];

    requests =
        requests.filter(
            x => x !== username
        );


    await update(

        ref(
            db,
            "users/" +
            currentUser.username
        ),

        {

            requests:
                requests

        }

    );


    loadNotifications();

};


loadNotifications();

setInterval(

    loadNotifications,

    3000

);

</script>

<script type="module" src="script.js"></script>

</body>
</html>
