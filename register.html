<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <h1>Create Account</h1>

    <input
        id="regUsername"
        class="textbox"
        type="text"
        placeholder="Username">

    <br><br>

    <input
        id="regPassword"
        class="textbox"
        type="password"
        placeholder="Password">

    <br><br>

    <button class="play-button" onclick="register()">
        Register
    </button>

    <button class="play-button"
        onclick="location.href='login.html'">
        Back to Login
    </button>

    <br><br>

    <p
        id="registerError"
        style="
            color:red;
            font-weight:bold;
        ">
    </p>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
    ref,
    get,
    set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

window.register = async function () {

    let username =
        document
        .getElementById("regUsername")
        .value
        .trim();

    let password =
        document
        .getElementById("regPassword")
        .value;

    let error =
        document.getElementById(
            "registerError"
        );

    error.innerText = "";

    // CHECK EMPTY
    if (!username || !password) {

        error.innerText =
            "Please fill all fields.";

        alert("Please fill all fields.");

        return;
    }

    // CHECK USER EXISTS
    let userRef =
        ref(
            db,
            "users/" + username
        );

    let snap =
        await get(userRef);

    if (snap.exists()) {

        error.innerText =
            "Username already exists.";

        alert("Username already exists.");

        return;
    }

    // CREATE ACCOUNT
    await set(userRef, {

        username: username,

        password: password,

        coins: 100,

        avatar:
            "https://placehold.co/120x120",

        language: "en",

        createdAt: Date.now(),

        likes: {},

        gamesPlayed: {},

        friends: [],

        requests: [],

        blocked: [],

        online: false,

        lastSeen: Date.now()

    });

    // LOGIN SESSION
    localStorage.setItem(
        "currentUser",

        JSON.stringify({

            username: username,

            avatar:
                "https://placehold.co/120x120"

        })
    );

    alert("Account created successfully!");

    // GO HOME
    window.location.href =
        "index.html";

};

</script>

</body>
</html>
